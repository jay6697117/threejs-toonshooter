<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sanguo Shooter</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: radial-gradient(circle at top, #0d1224, #04040b 65%);
      --panel: rgba(6, 13, 33, 0.72);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8fbff;
      --muted: rgba(248, 251, 255, 0.72);
      --accent: #8cff75;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: grid;
      place-items: center;
      padding: 14px;
    }

    #app {
      width: min(96vw, calc(96vh * (16 / 9)));
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.35);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.45);
      position: relative;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      outline: none;
    }

    #overlay {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      pointer-events: none;
      user-select: none;
    }

    #overlay .panel {
      pointer-events: none;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 10px;
      display: inline-flex;
      gap: 10px;
      align-items: baseline;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
    }

    #overlay .title {
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #overlay .hint {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #overlay a {
      pointer-events: auto;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(140, 255, 117, 0.35);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas" tabindex="0"></canvas>
    <div id="overlay">
      <div class="panel">
        <div class="title">Sanguo Shooter</div>
        <div class="hint">WASD · Mouse · LMB</div>
      </div>
      <div class="panel">
        <div class="hint"><a href="/">Back</a></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/game/main.ts"></script>
</body>
</html>
